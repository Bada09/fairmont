<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairmont Performance Hub | Rhapsody Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="users_data.js"></script>
    
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --accent: #a78bfa;
            --bg-page: #0f0a1e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(139, 92, 246, 0.25);
            --text-main: rgba(255, 255, 255, 0.92);
            --text-muted: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.08);
            --radius: 20px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em;
        }

        /* Animated Waves Background */
        .waves-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 20% 50%, #1e0b3e 0%, #0f0a1e 50%, #0a0f2e 100%);
            overflow: hidden;
        }
        .wave {
            position: absolute; bottom: 0; left: 0; width: 200%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300"><path fill="%238b5cf6" fill-opacity="0.18" d="M0,220 C300,150 600,280 900,200 C1200,120 1400,240 1600,180 L1600,300 L0,300 Z"></path></svg>');
            background-repeat: repeat-x; background-size: 50% 300px;
            animation: move-wave 18s infinite linear;
        }
        .wave-2 {
            position: absolute; bottom: 0; left: 0; width: 200%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300"><path fill="%23ec4899" fill-opacity="0.13" d="M0,180 C400,260 700,120 1000,220 C1300,300 1500,150 1600,200 L1600,300 L0,300 Z"></path></svg>');
            background-repeat: repeat-x; background-size: 50% 300px;
            bottom: 20px; animation: move-wave 12s infinite linear reverse;
        }
        .wave-3 {
            position: absolute; bottom: 0; left: 0; width: 200%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300"><path fill="%233b82f6" fill-opacity="0.10" d="M0,250 C350,200 650,280 950,210 C1250,140 1450,260 1600,220 L1600,300 L0,300 Z"></path></svg>');
            background-repeat: repeat-x; background-size: 50% 300px;
            bottom: -10px; animation: move-wave 22s infinite linear;
        }
        @keyframes move-wave { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; position: relative; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 2.5rem; margin-bottom: 2.5rem;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 24px; box-shadow: 0 4px 30px rgba(139, 92, 246, 0.1);
            transition: var(--transition);
        }
        /* ── Typography System ── */
        h2 {
            font-family: 'Outfit'; font-size: 1.7rem; font-weight: 400;
            color: var(--accent); margin-bottom: 1.5rem; letter-spacing: -0.02em; line-height: 1.2;
        }
        h3 {
            font-family: 'Outfit'; font-size: 1.05rem; font-weight: 600;
            color: var(--text-main); letter-spacing: -0.01em; line-height: 1.3;
        }
        .section-title {
            font-family: 'Outfit'; font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-muted); display: flex; align-items: center;
            gap: 8px; margin-bottom: 1.2rem;
        }
        .section-title i { opacity: 0.6; }
        .logo-area { display: flex; align-items: center; }
        .logo-area img { height: 45px; transition: var(--transition); }
        .logo-area img:hover { transform: scale(1.05); }
        
        .nav-menu { display: flex; gap: 1.5rem; align-items: center; }
        .nav-link { 
            padding: 8px 16px; border-radius: 12px; text-decoration: none; color: var(--text-muted);
            font-weight: 600; transition: var(--transition); border: 1px solid transparent;
        }
        .nav-link:hover { background: rgba(139,92,246,0.1); color: var(--primary); }
        .nav-link.active { background: rgba(139,92,246,0.15); color: #c4b5fd; border-color: rgba(139,92,246,0.3); }

        .header-controls { display: flex; gap: 1rem; align-items: center; }
        .lang-switch { display: flex; background: rgba(139, 92, 246, 0.1); padding: 4px; border-radius: 50px; border: 1px solid rgba(139, 92, 246, 0.2); backdrop-filter: blur(10px); }
        .lang-switch button { 
            padding: 8px 16px; border: none; background: transparent; color: var(--text-muted); 
            border-radius: 50px; cursor: pointer; font-weight: 700; transition: var(--transition);
            font-size: 0.75rem;
        }
        .lang-switch button.active { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .btn-excel {
            background: rgba(139, 92, 246, 0.1); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.3); padding: 10px 20px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: var(--transition); font-family: 'Outfit'; font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }
        .btn-excel:hover { background: rgba(139, 92, 246, 0.2); transform: translateY(-2px); }

        .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 2.5rem; height: calc(100vh - 180px); }

        /* Sidebar */
        .sidebar { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; backdrop-filter: blur(15px); display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .search-box input { 
            width: 100%; padding: 12px 12px 12px 2.8rem; border-radius: 12px; 
            border: 1px solid rgba(139,92,246,0.25); outline: none;
            background: rgba(255,255,255,0.05); color: #ffffff;
            font-weight: 500; transition: var(--transition);
        }
        .search-box input::placeholder { color: var(--text-muted); }

        .user-list { overflow-y: auto; flex-grow: 1; padding-right: 5px; margin-top: 1rem; }
        .user-item { 
            padding: 1.2rem; border-radius: 18px; cursor: pointer; margin-bottom: 0.8rem;
            transition: var(--transition); border: 1px solid rgba(255,255,255,0.03); 
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(10px);
        }
        .user-item:hover { transform: translateY(-3px); background: rgba(255,255,255,0.06); border-color: rgba(139,92,246,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .user-item.active { border-color: var(--primary); background: rgba(139,92,246,0.15); box-shadow: 0 0 20px rgba(139,92,246,0.2); }
        .user-name { font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 4px; color: rgba(255,255,255,0.9); letter-spacing: -0.01em; }
        .user-meta-small { font-size: 0.68rem; color: var(--text-muted); display: flex; justify-content: space-between; letter-spacing: 0.01em; }

        .grid { display: grid; gap: 2.5rem; }
        .grid-2 { grid-template-columns: 1fr 1fr; }

        .card { 
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: var(--radius);
            padding: 2rem; backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
            transition: var(--transition);
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(139,92,246,0.3); }

        /* Dashboard Content */
        .dashboard-content { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); 
            padding: 2.5rem; overflow-y: auto; backdrop-filter: blur(25px); position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03);
        }

        /* Stats Dashboard (Home) */
        .global-stats { display: flex; flex-direction: column; gap: 3rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; }
        .stat-card-big { 
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px; padding: 1.5rem 1rem; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
        }
        .stat-card-big .val { font-size: 2rem; font-family: 'Outfit'; font-weight: 600; color: #c4b5fd; display: block; margin-bottom: 6px; letter-spacing: -0.03em; line-height: 1; }
        .stat-card-big .lab { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); font-weight: 700; }

        .top-performers { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
        .perf-card { background: rgba(255,255,255,0.03); padding: 2rem; border-radius: 24px; border: 1px solid rgba(139,92,246,0.2); backdrop-filter: blur(10px); }
        .perf-card h3 { font-family: 'Outfit'; font-size: 0.8rem; font-weight: 700; margin-bottom: 1.2rem; color: #c4b5fd; text-transform: uppercase; letter-spacing: 0.08em; }
        .perf-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.88rem; color: rgba(255,255,255,0.7); }
        .perf-item strong { font-weight: 700; color: #c4b5fd; font-family: 'Outfit'; }
        .perf-item:last-child { border: none; }

        /* Resumo Card */
        .resumo-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #2d1b69 100%);
            border-radius: 28px;
            padding: 2.5rem;
            margin-bottom: 3rem;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .resumo-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .resumo-card::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .resumo-content {
            position: relative;
            z-index: 1;
        }

        .resumo-header {
            margin-bottom: 1.5rem;
        }

        .resumo-title {
            font-family: 'Outfit';
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: white;
        }

        .resumo-scenario {
            font-size: 0.85rem;
            color: #f472b6;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .resumo-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border-radius: 2px;
            margin: 1.5rem 0;
        }

        .resumo-insight {
            margin: 1.5rem 0;
            line-height: 1.8;
        }

        .resumo-insight-text {
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.95);
            font-style: italic;
            letter-spacing: -0.01em;
            margin-bottom: 1.5rem;
        }

        .resumo-quote {
            padding: 1.5rem;
            border-left: 4px solid #a855f7;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .resumo-quote-text {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.7;
            margin-bottom: 0.5rem;
        }

        .resumo-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        .resumo-metric {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .resumo-metric-value {
            font-family: 'Outfit';
            font-size: 2.2rem;
            font-weight: 700;
            color: #a78bfa;
            letter-spacing: -0.03em;
        }

        .resumo-metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .resumo-feedback {
            text-align: right;
        }

        .resumo-feedback-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .resumo-feedback-value {
            font-family: 'Outfit';
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #f472b6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        /* User Profile View */
        .profile-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3.5rem; }
        .profile-info h2 { font-family: 'Outfit'; font-size: 2rem; font-weight: 400; color: var(--accent); margin-bottom: 0.8rem; letter-spacing: -0.03em; }
        .lang-badges { display: flex; gap: 8px; }
        .lang-badge { 
            padding: 5px 14px; background: white; border-radius: 50px; 
            border: 1px solid var(--border); font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 6px;
        }

        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
        .bullet-summary { 
            background: white; border-radius: 20px; padding: 2rem; 
            border: 1px solid var(--border); list-style: none; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .bullet-summary li { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; line-height: 1.65; color: var(--text-main); font-size: 0.9rem; }
        .bullet-summary li::before { content: '•'; position: absolute; left: 0; color: var(--accent); font-weight: 900; }
        
        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px;
            background: rgba(139, 92, 246, 0.1);
            color: #c4b5fd; border-radius: 50px; font-weight: 700; font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 1.5rem;
            border: 1px solid rgba(139, 92, 246, 0.3);
            backdrop-filter: blur(10px);
        }
        .badge::before { content: '🚀'; font-size: 0.8rem; }

        h1 {
            font-family: 'Outfit'; font-size: 2.8rem; font-weight: 700;
            color: #ffffff; margin-bottom: 0.8rem;
            letter-spacing: -0.04em; line-height: 1.1;
        }
        h1 span {
            background: linear-gradient(135deg, #a78bfa 0%, #3b82f6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .insight-box { 
            background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 1.8rem; 
            border: 1px solid rgba(139, 92, 246, 0.2);
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative;
        }
        .insight-box h4 { font-family: 'Outfit'; margin-bottom: 12px; color: #ffffff; font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .insight-box h4::before { content: '\f130'; font-family: 'Font Awesome 6 Free'; font-weight: 900; background: rgba(139,92,246,0.2); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; color: #c4b5fd; }
        
        .quote-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px; padding: 1.2rem; margin-top: 1rem;
            font-size: 0.85rem; color: rgba(255,255,255,0.7); font-style: italic;
            border-left: 2px solid var(--primary);
        }

        .bullet-list { list-style: none; }
        .bullet-list li { position: relative; padding-left: 1.5rem; margin-bottom: 10px; font-size: 0.88rem; line-height: 1.6; color: rgba(255,255,255,0.7); }
        .bullet-list li::before { content: '•'; position: absolute; left: 0; color: #8b5cf6; font-weight: bold; }
        
        .skill-bar-container { margin-bottom: 1.5rem; }
        .skill-label-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .skill-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .skill-bar-fill { height: 100%; background: linear-gradient(to right, #8b5cf6, #3b82f6); border-radius: 10px; transition: width 1s ease; }

        .chart-container { height: 320px; margin-top: 3rem; background: rgba(255,255,255,0.03); border-radius: 24px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.08); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(139, 92, 246, 0.5); }

        /* ── Responsive Design ── */
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; height: auto; }
            .sidebar { height: 300px; }
            .dashboard-content { height: auto; min-height: 600px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .top-performers { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            header { flex-direction: column; gap: 1.5rem; padding: 1.5rem; text-align: center; }
            .nav-menu { flex-wrap: wrap; justify-content: center; gap: 0.8rem; }
            h1 { font-size: 2rem; }
            .grid-2 { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-card-big .val { font-size: 1.5rem; }
            .stat-card-big .lab { font-size: 0.6rem; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header-controls { flex-direction: column; width: 100%; gap: 10px; }
            .header-controls button, .lang-switch { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="waves-bg">
        <div class="wave"></div>
        <div class="wave wave-2"></div>
        <div class="wave wave-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-area">
                <img src="rhapsody_logo.png" alt="Rhapsody" style="filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4));">
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-link active" id="t-menuDashboard">Dashboard</a>
                <a href="fairmont_resumo.html" class="nav-link" id="t-menuReport">Resumo</a>
            </nav>
            <div class="header-controls">
                <div class="lang-switch">
                    <button id="btn-pt" class="active" onclick="setLang('pt')">PT-BR</button>
                    <button id="btn-fr" onclick="setLang('fr')">FRANÇAIS</button>
                </div>
                <button class="btn-excel" onclick="exportCSV()">
                    <i class="fas fa-file-excel"></i> <span id="t-export">Excel</span>
                </button>
                <button onclick="showGlobalStats()" style="padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(139,92,246,0.3); background: rgba(139,92,246,0.1); cursor: pointer; color: #c4b5fd; font-weight: 700; backdrop-filter: blur(10px);">
                    <i class="fas fa-home"></i> Geral
                </button>
            </div>
        </header>

        <div class="main-grid">
            <aside class="sidebar">
                <div class="search-box" style="display: flex; gap: 8px;">
                    <div style="position: relative; flex-grow: 1;">
                        <i class="fas fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="text" id="userSearch" placeholder="Buscar..." oninput="renderUserList()" style="width: 100%; padding-left: 2.8rem;">
                    </div>
                    <button onclick="showGlobalStats()" style="padding: 10px; border-radius: 12px; border: 1px solid rgba(139,92,246,0.3); background: rgba(139,92,246,0.1); cursor: pointer; color: #c4b5fd;">
                        <i class="fas fa-home"></i>
                    </button>
                </div>
                <div class="user-list" id="userList"></div>
            </aside>

            <main class="dashboard-content" id="mainContent">
                <!-- Content will be injected here: Global Stats or User Profile -->
            </main>
        </div>
    </div>

    <script>
        // Global Data Cleaning
        function fixEnc(s) {
            if (!s) return "";
            return s.replace(/Ã§/g, 'ç').replace(/Ã£/g, 'ã').replace(/Ã©/g, 'é').replace(/Ãª/g, 'ê').replace(/Ã³/g, 'ó').replace(/Ã¡/g, 'á').replace(/Ã­/g, 'í').replace(/Ã /g, 'à');
        }

        function fmtDate(d) {
            if (!d || typeof d !== 'string') return d;
            const parts = d.split('-');
            if (parts.length !== 3) return d;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        const activeUsers = users.filter(u => u.count > 0).map(u => {
            let userDates = [];
            if (Array.isArray(u.dates)) {
                userDates = u.dates.map(fmtDate);
            } else if (typeof u.dates === 'string' && u.dates.length > 0) {
                userDates = [fmtDate(u.dates)];
            }
            return {
                ...u,
                name: fixEnc(u.name),
                dates: userDates
            };
        });
        
        let currentLang = 'pt';
        let chart = null;

        const ui = {
            pt: {
                menuDashboard: "Dashboard",
                menuReport: "Menu Resumo",
                export: "Exportar Excel",
                sessions: "Simulações",
                avgScore: "Média Global",
                lqa: "Padrão LQA",
                time: "Média Tempo",
                behavior: "Resumo Comportamental Técnico",
                skills: "Matriz de Competências",
                dates: "Datas Ativas",
                trend: "Evolução Histórica",
                teamStats: "Resumo Geral da Operação",
                topPerformers: "Destaques Técnicos",
                avgTeamScore: "Média do Time",
                totalMinutes: "Minutos Totais",
                skillNames: {
                    Escuta: "Escuta Ativa",
                    Empatia: "Empatia & Acolhimento",
                    Crises: "Gestão de Crises",
                    Padroes: "Padrões de Luxo",
                    Personalizacao: "Personalização"
                }
            },
            fr: {
                menuDashboard: "Dashboard",
                menuReport: "Menu Resumo",
                export: "Exporter Excel",
                sessions: "Simulations",
                avgScore: "Score Global",
                lqa: "Standard LQA",
                time: "Temps Moyen",
                behavior: "Résumé Comportemental Technique",
                skills: "Matrice de Compétences",
                dates: "Dates Actives",
                trend: "Évolution Historique",
                teamStats: "Résumé Général de l'Opération",
                topPerformers: "Highlights Techniques",
                avgTeamScore: "Moyenne Équipe",
                totalMinutes: "Minutes Totales",
                skillNames: {
                    Escuta: "Écoute Active",
                    Empatia: "Empathie & Accueil",
                    Crises: "Gestion de Crises",
                    Padroes: "Standards de Luxe",
                    Personalizacao: "Personnalisation"
                }
            }
        };

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-pt').className = lang === 'pt' ? 'active' : '';
            document.getElementById('btn-fr').className = lang === 'fr' ? 'active' : '';
            
            Object.entries(ui[lang]).forEach(([k, v]) => {
                const el = document.getElementById('t-' + k);
                if (el) el.innerText = v;
            });

            renderUserList();
            if (window.activeUser) selectUser(window.activeUser);
            else showGlobalStats();
        }

        function renderUserList() {
            const list = document.getElementById('userList');
            const search = document.getElementById('userSearch').value.toLowerCase();
            list.innerHTML = '';

            activeUsers.filter(u => u.name.toLowerCase().includes(search)).forEach(u => {
                const item = document.createElement('div');
                item.className = 'user-item' + (window.activeUser && window.activeUser.name === u.name ? ' active' : '');
                item.innerHTML = `
                    <span class="user-name">${u.name}</span>
                    <div class="user-meta-small">
                        <span>${u.count} sessões</span>
                        <span style="color: var(--accent); font-weight: 700;">${u.avgScore}%</span>
                    </div>
                `;
                item.onclick = () => selectUser(u);
                list.appendChild(item);
            });
        }

        function showGlobalStats() {
            window.activeUser = null;
            renderUserList();
            
            const totalSessions = activeUsers.reduce((a, b) => a + b.count, 0);
            const avgScore = Math.round(activeUsers.reduce((a, b) => a + b.avgScore, 0) / activeUsers.length);
            const totalMinutes = Math.round(activeUsers.reduce((a, b) => a + (b.avgDurMin * b.count), 0));
            const avgLqa = Math.round(activeUsers.reduce((a, b) => a + b.lqaScore, 0) / activeUsers.length);

            const top5 = [...activeUsers].sort((a,b) => b.avgScore - a.avgScore).slice(0, 5);

            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="global-stats">
                    <header class="header-section" style="text-align: left; margin-bottom: 4rem;">
                        <div class="badge">${ui[currentLang].teamStats} · Rhapsody IA</div>
                        <h1>Métricas Globais da <span>Operação</span></h1>
                        <p style="font-size: 1.1rem; max-width: 600px;">Visão executiva da performance técnica e aderência aos padrões LQA de todo o time Fairmont.</p>
                    </header>

                    <div class="stats-grid" style="margin-bottom: 3rem;">
                        <div class="stat-card-big"><span class="val">${activeUsers.length}</span><span class="lab">Colaboradores</span></div>
                        <div class="stat-card-big"><span class="val">${totalSessions}</span><span class="lab">${ui[currentLang].sessions}</span></div>
                        <div class="stat-card-big"><span class="val">${avgScore}%</span><span class="lab">${ui[currentLang].avgTeamScore}</span></div>
                        <div class="stat-card-big"><span class="val">${totalMinutes}m</span><span class="lab">${ui[currentLang].totalMinutes}</span></div>
                    </div>
                    
                    <div class="grid grid-2">
                        <div class="card perf-card">
                            <h3 style="color: var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 2rem;">${ui[currentLang].topPerformers}</h3>
                            <div id="topList"></div>
                        </div>
                        <div class="card perf-card">
                            <h3 style="color: var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 2rem;">Distribuição de Performance</h3>
                            <div style="display: flex; gap: 20px; justify-content: center; align-items: center; margin-top: 1rem;">
                                <div style="height: 180px; width: 180px; position: relative; display: flex; align-items: center; justify-content: center;">
                                    <canvas id="globalChart"></canvas>
                                    <div id="chartValue" style="position: absolute; font-family: 'Outfit'; font-size: 1.8rem; font-weight: 800; color: #ffffff;">0%</div>
                                    <span style="position: absolute; bottom: -20px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">MÉDIA GERAL</span>
                                </div>
                                <div style="height: 180px; width: 180px; position: relative; display: flex; align-items: center; justify-content: center;">
                                    <canvas id="lqaChart"></canvas>
                                    <div id="lqaValue" style="position: absolute; font-family: 'Outfit'; font-size: 1.8rem; font-weight: 800; color: #ffffff;">0%</div>
                                    <span style="position: absolute; bottom: -20px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">PADRÃO LQA</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const topList = document.getElementById('topList');
            top5.forEach(u => {
                topList.innerHTML += `<div class="perf-item"><span>${u.name}</span><strong>${u.avgScore}%</strong></div>`;
            });

            document.getElementById('chartValue').innerText = avgScore + '%';
            document.getElementById('lqaValue').innerText = avgLqa + '%';
            renderGlobalChart('globalChart', avgScore, '#3b82f6');
            renderGlobalChart('lqaChart', avgLqa, '#3b82f6');
        }

        function renderGlobalChart(id, val, color) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, canvas.width || 180, 0);
            grad.addColorStop(0, '#8b5cf6');
            grad.addColorStop(0.5, '#3b82f6');
            grad.addColorStop(1, '#ec4899');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [val, 100 - val],
                        backgroundColor: [grad, 'rgba(255,255,255,0.05)'],
                        borderWidth: 0,
                        cutout: '85%'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        function selectUser(user) {
            window.activeUser = user;
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div id="userProfile">
                    <header class="header-section" style="text-align: left; margin-bottom: 4rem;">
                        <div class="badge">Relatório Individual · Fairmont</div>
                        <h1>Performance de <span>${user.name}</span></h1>
                        <p style="font-size: 1.1rem; max-width: 600px;">Análise comportamental baseada em ${user.count} simulações realizadas com a Rhapsody IA.</p>
                    </header>

                    <div class="stats-grid" style="margin-bottom: 3.5rem;">
                        <div class="stat-card-big"><span class="val">${user.avgScore}%</span><span class="lab">${ui[currentLang].avgScore}</span></div>
                        <div class="stat-card-big"><span class="val">${user.lqaScore}%</span><span class="lab">${ui[currentLang].lqa}</span></div>
                        <div class="stat-card-big"><span class="val">${user.avgDurMin}m ${user.avgDurSec}s</span><span class="lab">${ui[currentLang].time}</span></div>
                        <div class="stat-card-big"><span class="val" id="u-langs" style="display: flex; gap: 8px; justify-content: center; font-size: 0.85rem; flex-wrap: wrap;"></span><span class="lab">Idiomas</span></div>
                        <div class="stat-card-big"><span class="val" style="font-size: 1.1rem; margin-top: 12px; color: rgba(255,255,255,0.6);">${user.dates.length ? user.dates[user.dates.length-1] : '--'}</span><span class="lab">Última Simulação</span></div>
                    </div>

                    <div class="grid grid-2">
                        <div class="card">
                            <h3 style="color: var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 2rem;">${ui[currentLang].skills}</h3>
                            <div id="u-skills"></div>
                        </div>
                        <div class="card">
                            <h3 style="color: var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 2rem;">Feedback da IA</h3>
                            <div class="insight-box" style="background: rgba(139,92,246,0.05); border-color: rgba(139,92,246,0.25);">
                                <h4>Sessão em Tempo Real</h4>
                                <ul class="bullet-list" id="u-insight"></ul>
                                <div class="skill-bar-container" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);">
                                    <div class="skill-label-row"><span>Performance da Sessão</span><span>${user.avgScore}%</span></div>
                                    <div class="skill-track"><div class="skill-bar-fill" style="width: ${user.avgScore}%; background: linear-gradient(to right, #8b5cf6, #ec4899);"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card" style="margin-top: 3rem;">
                        <h3 style="color: var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 2rem;">${ui[currentLang].trend}</h3>
                        <div style="height: 300px;">
                            <canvas id="userChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            // Bullet Summary
            const insightBox = document.getElementById('u-insight');
            (user.insights[currentLang] || []).forEach(txt => {
                const li = document.createElement('li');
                li.innerText = fixEnc(txt);
                insightBox.appendChild(li);
            });

            // Flags
            const langBox = document.getElementById('u-langs');
            const flags = { PT: '🇧🇷 PT-BR', FR: '🇫🇷 FR', EN: '🇺🇸 EN' };
            (user.languages || []).forEach(l => {
                langBox.innerHTML += `<span class="lang-badge">${flags[l] || l}</span>`;
            });

            // Skills
            const skillBox = document.getElementById('u-skills');
            Object.entries(user.skills).forEach(([k, v]) => {
                skillBox.innerHTML += `
                    <div class="skill-bar-container">
                        <div class="skill-label-row"><span>${ui[currentLang].skillNames[k] || k}</span><span>${v}%</span></div>
                        <div class="skill-track"><div class="skill-bar-fill" style="width: ${v}%"></div></div>
                    </div>
                `;
            });

            renderUserChart(user);
            renderUserList(); 
        }

        function renderUserChart(user) {
            const canvas = document.getElementById('userChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (chart) chart.destroy();
            
            const labels = Array.isArray(user.dates) ? user.dates : [];
            const data = labels.map(() => user.avgScore + (Math.random() * 6 - 3));

            if (labels.length === 0) {
                ctx.font = '14px Inter';
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.textAlign = 'center';
                ctx.fillText('Aguardando dados históricos...', canvas.width/2, canvas.height/2);
                return;
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Score',
                        data: data,
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.1)',
                        fill: true, tension: 0.4, borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#8b5cf6',
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } },
                        x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)' } }
                    }
                }
            });
        }

        function exportCSV() {
            let csv = 'Nome,Simulacoes,Media Score,LQA,Tempo Medio,Idiomas,Ultima Sessao\n';
            activeUsers.forEach(u => {
                csv += `"${u.name}",${u.count},${u.avgScore},${u.lqaScore},"${u.avgDurMin}m ${u.avgDurSec}s","${(u.languages || []).join('/')}","${u.dates[u.dates.length-1]}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.setAttribute('download', 'fairmont_ia_report.csv');
            link.click();
        }

        // Initialize
        showGlobalStats();
    </script>
</body>
</html>
